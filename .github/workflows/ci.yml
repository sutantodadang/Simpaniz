name: CI

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  build-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

  smoke-linux:
    name: End-to-end smoke (Linux)
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build release
        run: zig build -Doptimize=ReleaseSafe

      - name: Run smoke test
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p smoke-data
          SIMPANIZ_HOST=127.0.0.1 SIMPANIZ_PORT=19001 SIMPANIZ_DATA_DIR=./smoke-data \
            SIMPANIZ_ANONYMOUS=1 \
            ./zig-out/bin/simpaniz &
          SERVER_PID=$!
          trap "kill $SERVER_PID || true" EXIT
          for i in $(seq 1 20); do
            curl -fsS http://127.0.0.1:19001/healthz && break
            sleep 0.5
          done
          curl -fsS -X PUT http://127.0.0.1:19001/ci-bucket
          echo "hello world" > /tmp/payload.txt
          curl -fsS -X PUT --data-binary @/tmp/payload.txt \
            -H "Content-Type: text/plain" \
            http://127.0.0.1:19001/ci-bucket/hello.txt
          BODY=$(curl -fsS http://127.0.0.1:19001/ci-bucket/hello.txt)
          test "$BODY" = "hello world"
          curl -fsS -X DELETE http://127.0.0.1:19001/ci-bucket/hello.txt
          curl -fsS -X DELETE http://127.0.0.1:19001/ci-bucket
          curl -fsS http://127.0.0.1:19001/metrics | head -5

  docker:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/simpaniz
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest

      - name: Build & push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
